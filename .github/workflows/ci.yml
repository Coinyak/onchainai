# OnchainAI CI — fast rust baseline on PRs; heavy agent-harness + UI coherence on demand.
#
# Merge gate: ci-success (requires rust; agent-harness + ui-coherence also gate when run manually).
#
# Triggers:
# - pull_request → main (same-repo PRs only): rust job only — fast fmt/clippy/test.
# - workflow_dispatch (manual): full suite incl. agent-harness + ui-coherence
#   (Actions tab or `gh workflow run ci.yml`). Heavy UI/browser checks stay local via
#   ./scripts/ui-change-gate.sh; run them here on demand before a risky merge.
name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.90
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features ssr -- -W clippy::all

      - name: Unit tests (lib)
        run: cargo test --features ssr --lib

  agent-harness:
    name: agent-harness
    # Heavy (Playwright + chromium). Manual only — not a PR merge gate.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.90
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh scripts/git-hooks/pre-commit .cursor/hooks/*.sh 2>/dev/null || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Agent harness contract
        run: ./scripts/agent-harness-check.sh

      - name: Readiness (CI strict L1–L4)
        run: ./scripts/agent-readiness-report.sh --strict-ci

  ui-coherence:
    name: ui-coherence
    # Heavy (release build + Postgres + browser smoke). Manual only — not a PR merge gate.
    # UI coherence is covered locally by ./scripts/ui-change-gate.sh while iterating.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: onchainai
          POSTGRES_PASSWORD: onchainai
          POSTGRES_DB: onchainai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onchainai -d onchainai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ONCHAINAI_DISK_GUARD_FORCE: "1"
      SKIP_CRAWLER: "1"
      DATABASE_URL: postgresql://onchainai:onchainai@localhost:5432/onchainai
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-only
      SUPABASE_SERVICE_KEY: placeholder-service-key-for-ci-only
      GITHUB_CLIENT_ID: placeholder-github-client-id
      GITHUB_CLIENT_SECRET: placeholder-github-client-secret
      SIWX_DOMAIN: localhost:3000
      JWT_SECRET: ci-jwt-secret-at-least-32-bytes-long
      PORT: "3000"
      API_PORT: "3001"
      API_PROXY_TARGET: http://127.0.0.1:3001
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.90

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Coherent API + Next.js release build
        run: ./scripts/release-build.sh

      - name: UI bundle staleness check
        run: ./scripts/ui-staleness-check.sh --worktree

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start stack, smoke, and browser gate
        run: |
          ./scripts/restart-dev.sh --no-build
          export ONCHAINAI_SMOKE_API_BASE="http://127.0.0.1:${API_PORT}"
          node scripts/ui-browser-gate.mjs "http://127.0.0.1:${PORT}"

      - name: Stop servers
        if: always()
        run: |
          for f in target/api-dev.pid target/next-dev.pid; do
            if [[ -f "$f" ]]; then
              kill "$(cat "$f")" 2>/dev/null || true
            fi
          done

  ci-success:
    name: ci-success
    needs: [rust, agent-harness, ui-coherence]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Require passing jobs
        run: |
          echo "rust: ${{ needs.rust.result }}"
          echo "agent-harness: ${{ needs.agent-harness.result }}"
          echo "ui-coherence: ${{ needs.ui-coherence.result }}"
          # rust is the PR merge gate — always required.
          if [[ "${{ needs.rust.result }}" != "success" ]]; then
            echo "rust job failed" >&2
            exit 1
          fi
          # agent-harness + ui-coherence are manual-only: skipped on PRs (OK),
          # but must pass when run via workflow_dispatch.
          if [[ "${{ needs.agent-harness.result }}" == "failure" ]]; then
            echo "agent-harness job failed" >&2
            exit 1
          fi
          if [[ "${{ needs.ui-coherence.result }}" == "failure" ]]; then
            echo "ui-coherence job failed" >&2
            exit 1
          fi
          echo "CI SUCCESS"