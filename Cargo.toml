[package]
name = "onchainai"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Crypto tool directory — auto-discover, normalize, and expose fragmented crypto tools for humans and agents."
license = "MIT"

[package.metadata.leptos]
output-name = "onchainai"
site-root = "target/site"
site-pkg-dir = "pkg"
site-addr = "127.0.0.1:3000"
reload-port = 3001
bin-features = ["ssr"]
bin-default-features = false
lib-features = ["hydrate"]
lib-default-features = false
lib-profile-release = "wasm-release"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "onchainai"
path = "src/main.rs"
required-features = ["ssr"]

[features]
default = ["ssr"]
ssr = [
    "leptos/ssr",
    "leptos_meta/ssr",
    "leptos_router/ssr",
]
hydrate = [
    "leptos/hydrate",
    "dep:console_error_panic_hook",
]

[profile.wasm-release]
inherits = "release"
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[dependencies]
leptos = { version = "0.8", default-features = false }
leptos_axum = "0.8"
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "cors", "trace", "set-header", "limit", "compression-gzip"] }
rmcp = { version = "0.1", features = ["server", "transport-sse"] }
sqlx = { version = "0.8", features = ["postgres", "uuid", "chrono", "json", "macros", "runtime-tokio", "migrate"] }
reqwest = { version = "0.12", features = ["json"] }
scraper = "0.22"
base64 = "0.22"
urlencoding = "2"
tokio = { version = "1", features = ["full"] }
tokio-cron-scheduler = "0.14"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
slug = "0.1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
supabase-auth = "0.10"
jsonwebtoken = "9"
sha2 = "0.10"
getrandom = "0.2"
ethers-core = "2"
solana-sdk = "2"
validator = { version = "0.18", features = ["derive"] }
governor = "0.6"
leptos_meta = { version = "0.8", default-features = false }
leptos_router = { version = "0.8", default-features = false }
tower_governor = { version = "0.8.0", features = ["tracing"] }
wasm-bindgen = "0.2"
console_error_panic_hook = { version = "0.1", optional = true }
gloo-net = "0.6"
gloo-timers = { version = "0.3", features = ["futures"] }
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["RequestCredentials", "Window", "Navigator", "Clipboard", "Storage"] }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full", "test-util"] }