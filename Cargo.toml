[package]
name = "onchainai"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Crypto tool directory — auto-discover, normalize, and expose fragmented crypto tools for humans and agents."
license = "MIT"

[package.metadata.leptos]
output-name = "onchainai"
site-root = "target/site"
site-pkg-dir = "pkg"

[lib]
crate-type = ["rlib"]

[[bin]]
name = "onchainai"
path = "src/main.rs"

[features]
default = ["ssr"]
ssr = []
hydrate = ["leptos/hydrate", "dep:wasm-bindgen", "dep:console_error_panic_hook"]

[dependencies]
leptos = { version = "0.8", features = ["ssr"] }
leptos_axum = "0.8"
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "cors", "trace", "set-header", "limit", "compression-gzip"] }
rmcp = { version = "0.1", features = ["server", "transport-sse"] }
sqlx = { version = "0.8", features = ["postgres", "uuid", "chrono", "json", "macros", "runtime-tokio", "migrate"] }
reqwest = { version = "0.12", features = ["json"] }
scraper = "0.22"
base64 = "0.22"
urlencoding = "2"
tokio = { version = "1", features = ["full"] }
tokio-cron-scheduler = "0.14"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
slug = "0.1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
supabase-auth = "0.10"
jsonwebtoken = "9"
sha2 = "0.10"
getrandom = "0.2"
ethers-core = "2"
solana-sdk = "2"
validator = { version = "0.18", features = ["derive"] }
governor = "0.6"
leptos_meta = { version = "0.8" }
leptos_router = { version = "0.8" }
tower_governor = { version = "0.8.0", features = ["tracing"] }
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full", "test-util"] }