# Project-scoped MCP for OnchainAI (Vercel frontend + Railway API)

[mcp_servers.vercel]
url = "https://mcp.vercel.com/onchain-ai/onchainai"
enabled = true

[mcp_servers.railway]
command = "railway"
args = ["mcp"]
enabled = true

# stdio via npx (remote MCP); Grok project config supports command/args like railway.
[mcp_servers.onchainai]
command = "npx"
args = ["mcp-remote", "https://www.onchain-ai.xyz/mcp"]
enabled = true

[plugins]
enabled = ["vercel", "railway", "onchainai"]